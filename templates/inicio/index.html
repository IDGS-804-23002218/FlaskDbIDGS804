{% extends "layout.html" %}
{% block container %}

<div class="min-h-screen flex flex-col items-center justify-center py-20">

    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-3">
            Bienvenido al Sistema Escolar
        </h1>
        <p class="text-gray-500 dark:text-gray-400 text-lg">
            Selecciona una sección para continuar
        </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-4 gap-6 w-full max-w-4xl">

        <a href="/alumnos" class="flex flex-col items-center gap-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-8 shadow-sm hover:shadow-md hover:border-blue-400 transition-all group">
            <div class="bg-blue-100 dark:bg-blue-900 p-4 rounded-full">
                <svg class="w-8 h-8 text-blue-600 dark:text-blue-300" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 9a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm-8 9a7 7 0 1 1 14 0H7Z"/>
                </svg>
            </div>
            <span class="text-gray-900 dark:text-white font-semibold text-lg group-hover:text-blue-600 transition-colors">Alumnos</span>
        </a>

        <a href="/maestros" class="flex flex-col items-center gap-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-8 shadow-sm hover:shadow-md hover:border-green-400 transition-all group">
            <div class="bg-green-100 dark:bg-green-900 p-4 rounded-full">
                <svg class="w-8 h-8 text-green-600 dark:text-green-300" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v13m0-13c-2.8-.8-4.7-1-8-1v13c3.3 0 5.2.2 8 1Zm0 0c2.8-.8 4.7-1 8-1v13c-3.3 0-5.2.2-8 1Z"/>
                </svg>
            </div>
            <span class="text-gray-900 dark:text-white font-semibold text-lg group-hover:text-green-600 transition-colors">Maestros</span>
        </a>

        <a href="/cursos" class="flex flex-col items-center gap-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-8 shadow-sm hover:shadow-md hover:border-purple-400 transition-all group">
            <div class="bg-purple-100 dark:bg-purple-900 p-4 rounded-full">
                <svg class="w-8 h-8 text-purple-600 dark:text-purple-300" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 8h10M9 12h10M9 16h10M4.99 8H5m-.02 4h.01m0 4H5"/>
                </svg>
            </div>
            <span class="text-gray-900 dark:text-white font-semibold text-lg group-hover:text-purple-600 transition-colors">Cursos</span>
        </a>

        <a href="/consultas" class="flex flex-col items-center gap-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-8 shadow-sm hover:shadow-md hover:border-teal-400 transition-all group">
    <div class="bg-teal-100 dark:bg-teal-900 p-4 rounded-full">
        <svg class="w-8 h-8 text-teal-600 dark:text-teal-300" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 3a7 7 0 1 0 4.975 11.99l3.54 3.54a1 1 0 1 0 1.414-1.414l-3.54-3.54A7 7 0 0 0 10 3Z"/>
        </svg>
    </div>
    <span class="text-gray-900 dark:text-white font-semibold text-lg group-hover:text-teal-600 transition-colors">Consultas</span>
</a>

    </div>
</div>

{% endblock %}
